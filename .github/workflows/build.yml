name: Build nixos-ci deps (aarch64)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: DeterminateSystems/magic-nix-cache-action@v8

      - name: Build all nixos-ci dependencies
        run: |
          nix build .#nix_2_28 -L
          nix build .#attic-client -L
          nix build .#xonsh -L
          nix build .#nix -L

      - name: Export closures to local binary cache
        run: |
          mkdir -p ./cache
          nix copy --to file://$(pwd)/cache .#nix_2_28
          nix copy --to file://$(pwd)/cache .#attic-client
          nix copy --to file://$(pwd)/cache .#xonsh
          nix copy --to file://$(pwd)/cache .#nix
          tar czf nix-cache-aarch64.tar.gz -C cache .

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: nix-cache-aarch64.tar.gz
