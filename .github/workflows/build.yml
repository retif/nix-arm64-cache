name: Build nix 2.28.5 + attic-client (aarch64)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build nix 2.28.5
        run: nix build .#nix_2_28 -L

      - name: Build attic-client
        run: nix build .#attic-client -L

      - name: Export closure to local binary cache
        run: |
          mkdir -p ./cache
          nix copy --to file://$(pwd)/cache .#nix_2_28
          nix copy --to file://$(pwd)/cache .#attic-client
          tar czf nix-cache-aarch64.tar.gz -C cache .

      - name: Create release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: nix-cache-aarch64.tar.gz
